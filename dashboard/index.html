<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>orapli — Orchestrator Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base:     #1e1e2e;
  --bg-mantle:   #181825;
  --bg-surface0: #313244;
  --bg-surface1: #45475a;
  --bg-overlay0: #6c7086;
  --text:        #cdd6f4;
  --subtext:     #a6adc8;
  --muted:       #585b70;
  --accent:      #89b4fa;
  --yellow:      #f9e2af;
  --green:       #a6e3a1;
  --red:         #f38ba8;
}

body {
  background: var(--bg-base);
  color: var(--text);
  font-family: ui-monospace, 'SFMono-Regular', Menlo, Monaco, Consolas, monospace;
  font-size: 13px;
  line-height: 1.5;
  padding: 16px;
  min-height: 100vh;
}

h2 {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--subtext);
  margin-bottom: 8px;
}

/* ── header ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--bg-surface1);
}

.header h1 {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  line-height: 1.4;
}
.badge-running { background: var(--green);  color: #1e1e2e; }
.badge-stopped { background: var(--red);    color: #1e1e2e; }
.badge-waiting { background: var(--yellow); color: #1e1e2e; }
.badge-idle    { background: var(--bg-surface1); color: var(--subtext); }

.orch-meta {
  font-size: 11px;
  color: var(--muted);
}

.heartbeat {
  font-size: 11px;
  color: var(--muted);
  margin-left: auto;
}

/* ── persona row ── */
.persona-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.persona-card {
  background: var(--bg-mantle);
  border: 1px solid var(--bg-surface0);
  border-radius: 8px;
  padding: 10px 12px;
  border-top-width: 3px;
}

.persona-name {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 2px;
}

.persona-model {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 6px;
  word-break: break-all;
}

.persona-state { margin-bottom: 4px; }

.persona-work {
  font-size: 11px;
  color: var(--subtext);
  word-break: break-all;
  margin-top: 4px;
}

.persona-activity {
  font-size: 10px;
  color: var(--muted);
  font-style: italic;
  word-break: break-all;
  margin-top: 2px;
}

.persona-cost {
  font-size: 11px;
  color: var(--yellow);
  margin-top: 6px;
}

.session-banner {
  background: var(--bg-mantle);
  border: 1px solid var(--bg-surface0);
  border-left-width: 3px;
  border-left-color: var(--accent);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12px;
}

.session-banner .session-kind {
  font-weight: 700;
  margin-right: 8px;
}

.session-banner .session-activity {
  color: var(--subtext);
  font-style: italic;
  word-break: break-all;
  display: block;
  margin-top: 4px;
}

/* ── middle row ── */
.mid-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.panel {
  background: var(--bg-mantle);
  border: 1px solid var(--bg-surface0);
  border-radius: 8px;
  padding: 12px;
  overflow: hidden;
  margin-bottom: 8px;
}

/* pipeline timeline */
.timeline-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}

.timeline-row {
  display: grid;
  grid-template-columns: 90px 1fr;
  align-items: center;
  gap: 8px;
}

.timeline-label {
  font-size: 11px;
  color: var(--subtext);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.timeline-bar {
  display: flex;
  height: 14px;
  border-radius: 3px;
  overflow: hidden;
  background: var(--bg-surface0);
}

.timeline-seg {
  height: 100%;
  min-width: 2px;
}

/* kanban */
.kanban-cols {
  display: flex;
  gap: 6px;
}

.kanban-col { flex: 1; min-width: 0; }

.kanban-col-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding-bottom: 4px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--bg-surface0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.kanban-count {
  font-size: 9px;
  color: var(--muted);
}

.kanban-card {
  background: var(--bg-surface0);
  border-radius: 4px;
  padding: 4px 6px;
  margin-bottom: 4px;
  font-size: 10px;
  color: var(--subtext);
}

.kanban-card-id {
  font-size: 9px;
  color: var(--accent);
  margin-bottom: 1px;
}

.kanban-empty {
  font-size: 10px;
  color: var(--muted);
  padding: 2px 0;
}

/* insight summary */
.insight-item {
  display: grid;
  grid-template-columns: 90px 64px 48px 1fr 90px;
  align-items: center;
  gap: 6px;
  padding: 5px 0;
  border-bottom: 1px solid var(--bg-surface0);
  font-size: 11px;
}
.insight-item:last-child { border-bottom: none; }
.insight-id { font-size: 10px; color: var(--accent); }
.insight-status { font-size: 10px; font-weight: 700; }
.insight-severity { font-size: 10px; }
.insight-meta {
  font-size: 10px;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.insight-source {
  font-size: 10px;
  color: var(--yellow);
  white-space: nowrap;
  text-align: right;
}

/* completed tasks */
.completed-item {
  display: grid;
  grid-template-columns: 64px 1fr 64px;
  align-items: center;
  gap: 6px;
  padding: 5px 0;
  border-bottom: 1px solid var(--bg-surface0);
  font-size: 11px;
}
.completed-item:last-child { border-bottom: none; }
.completed-id { font-size: 10px; color: var(--accent); }
.completed-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.completed-cost {
  font-size: 10px;
  color: var(--yellow);
  text-align: right;
  white-space: nowrap;
}

/* effectiveness funnel */
.funnel-step {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
  font-size: 11px;
}

.funnel-label {
  color: var(--subtext);
  width: 88px;
  flex-shrink: 0;
  font-size: 10px;
}

.funnel-bar-wrap {
  flex: 1;
  height: 10px;
  background: var(--bg-surface0);
  border-radius: 3px;
  overflow: hidden;
}

.funnel-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
}

.funnel-count {
  width: 24px;
  text-align: right;
  font-weight: 700;
  font-size: 11px;
}

.funnel-footer {
  margin-top: 8px;
  font-size: 10px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.funnel-footer span { color: var(--yellow); }

/* ── bottom row ── */
.bot-row {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap: 8px;
}

/* budget gauge */
.gauge-pct {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  line-height: 1.2;
  margin: 4px 0;
}

.gauge-bar-wrap {
  background: var(--bg-surface0);
  border-radius: 8px;
  height: 14px;
  overflow: hidden;
  margin: 8px 0;
}

.gauge-bar {
  height: 100%;
  border-radius: 8px;
}

.gauge-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
}

.gauge-pace {
  font-size: 10px;
  text-align: center;
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--bg-surface0);
}

.gauge-label {
  text-align: center;
  font-size: 10px;
  color: var(--subtext);
  margin-top: 2px;
}

/* stacked bar chart */
.chart-area {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 100px;
  margin-bottom: 4px;
}

.day-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  height: 100%;
  justify-content: flex-end;
  gap: 0;
}

.bar-stack {
  display: flex;
  flex-direction: column-reverse;
  width: 100%;
  border-radius: 3px 3px 0 0;
  overflow: hidden;
}

.bar-seg {
  width: 100%;
  min-height: 1px;
}

.day-label {
  font-size: 9px;
  color: var(--muted);
  margin-top: 4px;
  text-align: center;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--subtext);
}

.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* event log */
.log-scroll {
  max-height: 180px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-surface1) transparent;
}

.log-entry {
  display: flex;
  gap: 8px;
  padding: 3px 0;
  border-bottom: 1px solid var(--bg-surface0);
  font-size: 10px;
}

.log-entry:last-child { border-bottom: none; }

.log-ts {
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  width: 60px;
}

.log-msg { color: var(--subtext); word-break: break-word; }

/* placeholder */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 12px;
}

.placeholder h1 { font-size: 18px; color: var(--accent); }
.placeholder p  { font-size: 12px; color: var(--muted); }
.placeholder code { color: var(--subtext); }

/* refresh indicator */
.refresh-tick {
  position: fixed;
  bottom: 12px;
  right: 16px;
  font-size: 10px;
  color: var(--muted);
}
</style>
</head>
<body>
<div id="root"></div>
<div class="refresh-tick" id="tick"></div>

<script>
(function () {
  /* ── palette tokens ── */
  var C = {
    bg_base:     '#1e1e2e',
    bg_mantle:   '#181825',
    bg_surface0: '#313244',
    bg_surface1: '#45475a',
    text:        '#cdd6f4',
    subtext:     '#a6adc8',
    muted:       '#585b70',
    accent:      '#89b4fa',
    yellow:      '#f9e2af',
    green:       '#a6e3a1',
    red:         '#f38ba8',
  };

  /* per-persona accent colors (Catppuccin Mocha named hues) */
  var PERSONA_COLOR = {
    explorer:   '#cba6f7',  /* mauve  */
    architect:  '#89b4fa',  /* blue   */
    developer:  '#a6e3a1',  /* green  */
    qa_tester:  '#f9e2af',  /* yellow */
    documenter: '#89dceb',  /* sky    */
  };

  var PERSONA_NAMES = ['explorer', 'architect', 'developer', 'qa_tester', 'documenter'];

  var STATUS_COLOR = {
    todo:                   '#585b70',
    in_progress:            '#89b4fa',
    implemented:            '#cba6f7',
    approved_by_architect:  '#89dceb',
    review_failed:          '#f38ba8',
    qa_passed:              '#a6e3a1',
    pending_human_build:    '#f9e2af',
    blocked:                '#f38ba8',
  };

  // `merged` is not a real task status — tasks go pending_human_build ->
  // archived (removed from the register, see `completed` instead), never
  // through a `merged` state — so it is deliberately absent from both the
  // kanban columns and this color map (it would only ever render empty).
  var KANBAN_COLS = [
    'todo', 'in_progress', 'implemented',
    'approved_by_architect', 'review_failed',
    'qa_passed', 'pending_human_build', 'blocked',
  ];

  var INSIGHT_STATUS_COLOR = {
    proposed:  '#f9e2af',
    accepted:  '#89b4fa',
    rejected:  '#f38ba8',
    duplicate: '#6c7086',
  };

  /* ── helpers ── */
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fmt_usd(v) {
    if (v == null || v === '') return '—';
    var n = +v;
    return isNaN(n) ? '—' : '$' + n.toFixed(4);
  }

  function fmt_tokens(n) {
    if (n == null) return '—';
    n = +n;
    if (isNaN(n)) return '—';
    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
    return String(n);
  }

  function fmt_elapsed(s) {
    if (s == null) return '';
    s = Math.round(+s);
    if (s < 60) return s + 's';
    if (s < 3600) return Math.floor(s / 60) + 'm' + (s % 60) + 's';
    return Math.floor(s / 3600) + 'h' + Math.floor((s % 3600) / 60) + 'm';
  }

  function ts_hms(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch (e) { return String(iso).slice(11, 19) || ''; }
  }

  function date_md(iso) {
    if (!iso) return '';
    try {
      var d = new Date(iso);
      return (d.getMonth() + 1) + '/' + d.getDate();
    } catch (e) { return String(iso).slice(5, 10) || ''; }
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  /* ── render ── */
  function render(state) {
    var root = document.getElementById('root');
    if (!state) {
      root.innerHTML =
        '<div class="placeholder">' +
          '<h1>orapli Orchestrator Dashboard</h1>' +
          '<p>Waiting for orchestrator state…</p>' +
          '<p><code>../agent-hub/dashboard/state.js</code></p>' +
        '</div>';
      return;
    }

    root.innerHTML = build(state);
  }

  function build(state) {
    var orch   = state.orchestrator   || {};
    var pers   = state.personas       || {};
    var sess   = state.active_session || null;
    var tasks  = state.tasks          || {};
    var tl     = state.timelines      || {};
    var ins    = state.insights       || {};
    var budget = state.budget         || {};
    var pacing = state.pacing         || null;
    var costs  = state.costs          || {};
    var eff    = state.effectiveness  || {};
    var log    = state.log_tail       || [];
    var completed = state.completed   || [];

    /* staleness */
    var poll_s   = +(orch.poll_seconds || 60);
    var hb_ms    = orch.heartbeat ? new Date(orch.heartbeat).getTime() : 0;
    var stale_ms = poll_s * 2 * 1000;
    var orch_ok  = hb_ms > 0 && (Date.now() - hb_ms) <= stale_ms;

    return [
      build_header(orch, orch_ok),
      build_active_session(sess),
      build_personas(pers, costs),
      build_timeline(tasks, tl),
      build_mid(tasks, ins, eff, completed),
      build_bot(budget, costs, log, pacing),
    ].join('');
  }

  /* ── header ── */
  function build_header(orch, orch_ok) {
    var badge;
    if (!orch.heartbeat) {
      badge = '<span class="badge badge-waiting">waiting</span>';
    } else if (orch_ok) {
      badge = '<span class="badge badge-running">running</span>';
    } else {
      badge = '<span class="badge badge-stopped">stopped</span>';
    }

    return '<div class="header">' +
      '<h1>orapli Dashboard</h1>' +
      badge +
      '<span class="orch-meta">PID ' + esc(orch.pid || '—') +
        ' | poll ' + esc(orch.poll_seconds || '—') + 's</span>' +
      '<span class="heartbeat">♥ ' +
        (orch.heartbeat ? ts_hms(orch.heartbeat) : 'never') + '</span>' +
      '</div>';
  }

  /* ── persona cards ── */
  function build_personas(pers, costs) {
    var cards = PERSONA_NAMES.map(function (name) {
      var p = pers[name] || {};
      var c = (costs.per_persona || {})[name] || {};
      var col = PERSONA_COLOR[name] || C.accent;
      var running = p.state === 'running';
      var state_badge = running
        ? '<span class="badge badge-running" style="font-size:10px">running</span>'
        : '<span class="badge badge-idle"    style="font-size:10px">idle</span>';

      var work_html = '';
      if (running && p.cost_label) {
        work_html = '<div class="persona-work">' +
          esc(p.cost_label) +
          (p.elapsed_s != null ? ' (' + fmt_elapsed(p.elapsed_s) + ')' : '') +
          '</div>';
      }

      var activity_html = '';
      if (running && p.last_activity) {
        activity_html = '<div class="persona-activity">' + esc(p.last_activity) + '</div>';
      }

      return '<div class="persona-card" style="border-top-color:' + col + '">' +
        '<div class="persona-name" style="color:' + col + '">' + esc(name) + '</div>' +
        '<div class="persona-model">' + esc(p.model || '—') + '</div>' +
        '<div class="persona-state">' + state_badge + '</div>' +
        work_html +
        activity_html +
        '<div class="persona-cost">↑ ' + fmt_usd(c.today_usd) + ' today</div>' +
        '</div>';
    }).join('');

    return '<div class="persona-row">' + cards + '</div>';
  }

  /* ── single_session / hybrid_session banner ── */
  function build_active_session(sess) {
    if (!sess) return '';
    return '<div class="session-banner">' +
      '<span class="session-kind">' + esc(sess.kind) + '</span>' +
      '<span class="persona-model">' + esc(sess.model || '—') + '</span> · ' +
      esc(sess.cost_label || '') +
      (sess.elapsed_s != null ? ' (' + fmt_elapsed(sess.elapsed_s) + ')' : '') +
      (sess.last_activity
        ? '<span class="session-activity">' + esc(sess.last_activity) + '</span>'
        : '') +
      '</div>';
  }

  /* ── middle row ── */
  /* ── per-task pipeline timeline (Gantt-style) ── */
  function build_timeline(tasks, timelines) {
    var ids = Object.keys(tasks);
    if (!ids.length) return '';
    var now_ms = Date.now();

    var rows = ids.map(function (id) {
      var events = (timelines || {})[id] || [];
      var segs = [];
      var last_status = null, last_ts = null;
      events.forEach(function (e) {
        var status = null;
        if (e.action === 'add-task') status = 'todo';
        else if (e.action === 'claim') status = 'in_progress';
        else if (e.action.indexOf('->') !== -1) status = e.action.split('->').pop();
        if (!status) return; // renew-lease / record-cost don't change status -- no new segment
        if (last_status !== null) {
          segs.push({ status: last_status, from_ms: new Date(last_ts).getTime(), to_ms: new Date(e.ts).getTime() });
        }
        last_status = status;
        last_ts = e.ts;
      });
      if (last_status !== null) {
        segs.push({ status: last_status, from_ms: new Date(last_ts).getTime(), to_ms: now_ms });
      }
      if (!segs.length) return '';

      var total = Math.max(1, now_ms - segs[0].from_ms);
      var bar = segs.map(function (s) {
        var pct = clamp(((s.to_ms - s.from_ms) / total) * 100, 0.5, 100);
        var color = STATUS_COLOR[s.status] || C.muted;
        return '<div class="timeline-seg" style="width:' + pct + '%;background:' + color + '" ' +
          'title="' + esc(s.status) + ' — ' + fmt_elapsed((s.to_ms - s.from_ms) / 1000) + '"></div>';
      }).join('');

      return '<div class="timeline-row">' +
        '<div class="timeline-label">' + esc(id) + '</div>' +
        '<div class="timeline-bar">' + bar + '</div>' +
        '</div>';
    }).filter(Boolean).join('');

    if (!rows) return '';
    return '<div class="panel"><h2>Pipeline Timeline</h2><div class="timeline-list">' + rows + '</div></div>';
  }

  function build_mid(tasks, insights, eff, completed) {
    return '<div class="mid-row">' +
      build_kanban(tasks) +
      build_insights(insights) +
      build_funnel(eff) +
      build_completed(completed) +
      '</div>';
  }

  function build_kanban(tasks) {
    var by_status = {};
    KANBAN_COLS.forEach(function (s) { by_status[s] = []; });
    Object.keys(tasks).forEach(function (id) {
      var t = tasks[id];
      var s = t.status || 'todo';
      if (!by_status[s]) by_status[s] = [];
      by_status[s].push({
        id: id,
        title: t.title || '',
        target_files: t.target_files || [],
        attempts: t.attempts || 0,
        task_class: t.task_class || '',
      });
    });

    var cols = KANBAN_COLS.map(function (s) {
      var items = by_status[s] || [];
      var col_color = STATUS_COLOR[s] || C.muted;
      var label = s.replace(/_/g, ' ');
      var cards = items.length
        ? items.map(function (t) {
            var short = t.title.length > 50 ? t.title.slice(0, 50) + '…' : t.title;
            var tip = t.title +
              (t.task_class ? '\nclass: ' + t.task_class : '') +
              (t.target_files.length ? '\nfiles: ' + t.target_files.join(', ') : '') +
              (t.attempts ? '\nattempts: ' + t.attempts : '');
            return '<div class="kanban-card" title="' + esc(tip) + '">' +
              '<div class="kanban-card-id">' + esc(t.id) + '</div>' +
              esc(short) +
              '</div>';
          }).join('')
        : '<div class="kanban-empty">—</div>';

      return '<div class="kanban-col">' +
        '<div class="kanban-col-title" style="color:' + col_color + '">' +
          esc(label) + ' <span class="kanban-count">(' + items.length + ')</span>' +
        '</div>' +
        cards +
        '</div>';
    }).join('');

    return '<div class="panel"><h2>Tasks</h2><div class="kanban-cols">' + cols + '</div></div>';
  }

  function build_insights(insights) {
    var ids = Object.keys(insights);
    var rows = ids.length
      ? ids.map(function (id) {
          var ins = insights[id];
          var status_color = INSIGHT_STATUS_COLOR[ins.status] || C.muted;
          var source_badge = ins.source
            ? '<span class="insight-source" title="derived from a real GitHub issue">🔗 ' +
                esc(ins.source) + '</span>'
            : '<span class="insight-source"></span>';
          // verdict_reason is the framework's negative-knowledge record for
          // rejected/duplicate insights (SPEC §5) — surface it as a tooltip
          // on the whole row since there's no room to show it inline.
          var row_tip = ins.verdict_reason ? esc(ins.verdict_reason) : '';
          return '<div class="insight-item" title="' + row_tip + '">' +
            '<span class="insight-id">' + esc(id.slice(0, 14)) + '</span>' +
            '<span class="insight-status" style="color:' + status_color + '">' +
              esc(ins.status || '?') + '</span>' +
            '<span class="insight-severity">' + esc(ins.severity || '') + '</span>' +
            '<span class="insight-meta">' + esc(ins.category || '') + '</span>' +
            source_badge +
            '</div>';
        }).join('')
      : '<div style="color:var(--muted);font-size:11px">No insights</div>';

    return '<div class="panel"><h2>Insights</h2>' + rows + '</div>';
  }

  function build_completed(completed) {
    var rows = completed.length
      ? completed.map(function (c) {
          var cost = c.usd ? fmt_usd(c.usd) : fmt_tokens(c.tokens) + ' tok';
          var tip = (c.title || '') + '\nstatus: ' + (c.status || '') +
            '\narchived: ' + (c.archived_at || '');
          return '<div class="completed-item" title="' + esc(tip) + '">' +
            '<span class="completed-id">' + esc(c.task_id) + '</span>' +
            '<span class="completed-title">' + esc(c.title || '') + '</span>' +
            '<span class="completed-cost">' + esc(cost) + '</span>' +
            '</div>';
        }).join('')
      : '<div style="color:var(--muted);font-size:11px">No archived tasks yet</div>';

    return '<div class="panel"><h2 title="Most recently archived tasks — the only place finished work is visible once it leaves the Tasks board">Completed</h2>' +
      rows + '</div>';
  }

  function build_funnel(eff) {
    var funnel = eff.funnel || {};
    var steps = [
      { key: 'proposed',        label: 'Proposed',   tip: 'Insights ever registered (any verdict)' },
      { key: 'accepted',        label: 'Accepted',   tip: 'Insights the Architect accepted for decomposition' },
      { key: 'tasks_generated', label: 'Tasks',      tip: 'Accepted insights that produced at least one task' },
      { key: 'implemented',     label: 'Implemented', tip: 'Tasks that reached implemented or further (not yet necessarily merged)' },
      { key: 'merged',          label: 'Merged',     tip: 'Tasks archived so far (this month + prior months)' },
    ];
    var max_v = Math.max(1, funnel.proposed || 0);

    var rows = steps.map(function (step) {
      var v = +(funnel[step.key] || 0);
      var pct = clamp(Math.round((v / max_v) * 100), 0, 100);
      return '<div class="funnel-step" title="' + esc(step.tip) + '">' +
        '<span class="funnel-label">' + esc(step.label) + '</span>' +
        '<div class="funnel-bar-wrap"><div class="funnel-bar" style="width:' + pct + '%"></div></div>' +
        '<span class="funnel-count">' + v + '</span>' +
        '</div>';
    }).join('');

    var merged = +(funnel.merged || 0);
    var cum_usd = eff.cumulative_usd;
    var per_merged = merged > 0 && cum_usd != null
      ? fmt_usd(cum_usd / merged)
      : '—';

    var footer = '<div class="funnel-footer">' +
      '<div title="Total USD across every persona/session run ever recorded">Cumulative: <span>' + fmt_usd(cum_usd) + '</span></div>' +
      '<div title="Cumulative USD divided by tasks archived">Per merged task: <span>' + per_merged + '</span></div>' +
      '<div title="Spend attributed to tasks that needed more than one attempt. Known gap (SPEC §9): single_session/hybrid_session runs are not fully attributed here, so this understates true rework cost">Rework cost: <span>' + fmt_usd(eff.rework_usd) + '</span></div>' +
      '</div>';

    return '<div class="panel"><h2>Effectiveness</h2>' + rows + footer + '</div>';
  }

  /* ── bottom row ── */
  function build_bot(budget, costs, log, pacing) {
    return '<div class="bot-row">' +
      build_gauge(budget, pacing) +
      build_daybars(budget, costs) +
      build_log(log) +
      '</div>';
  }

  function build_gauge(budget, pacing) {
    var used  = +(budget.today_tokens || 0);
    var limit = +(budget.limit || 2000000);
    var pct   = clamp(Math.round((used / limit) * 100), 0, 100);
    var color = pct > 90 ? C.red : pct > 70 ? C.yellow : C.green;

    var pace_html = '';
    if (pacing) {
      var spent_pct   = Math.round((pacing.spent_frac || 0) * 100);
      var elapsed_pct = Math.round((pacing.elapsed_frac || 0) * 100);
      var pace_color  = pacing.throttle ? C.red : C.subtext;
      pace_html = '<div class="gauge-pace" style="color:' + pace_color + '">' +
        (pacing.throttle ? '⏸ throttled — ' : '') +
        'session pace: ' + spent_pct + '% spent / ' + elapsed_pct + '% of window elapsed' +
        '</div>';
    }

    return '<div class="panel">' +
      '<h2>Token Budget</h2>' +
      '<div class="gauge-pct" style="color:' + color + '">' + pct + '%</div>' +
      '<div class="gauge-label">of daily limit</div>' +
      '<div class="gauge-bar-wrap">' +
        '<div class="gauge-bar" style="width:' + pct + '%;background:' + color + '"></div>' +
      '</div>' +
      '<div class="gauge-row">' +
        '<span>' + fmt_tokens(used) + ' used</span>' +
        '<span>' + fmt_tokens(limit) + ' limit</span>' +
      '</div>' +
      pace_html +
      '</div>';
  }

  function build_daybars(budget, costs) {
    var per_day = budget.per_day || {};
    var per_day_persona = costs.per_day_persona || null;

    var days = Object.keys(per_day).sort().slice(-7);

    if (!days.length) {
      return '<div class="panel"><h2>Token Usage / Day</h2>' +
        '<div style="color:var(--muted);font-size:11px;margin-top:8px">No data yet</div></div>';
    }

    /* compute max for scaling */
    var max_t = 1;
    days.forEach(function (d) {
      var v = per_day[d];
      var t = typeof v === 'object' && v ? (+(v.tokens || 0)) : (+v || 0);
      if (t > max_t) max_t = t;
    });

    var bars = days.map(function (d) {
      var v = per_day[d];
      var total = typeof v === 'object' && v ? (+(v.tokens || 0)) : (+v || 0);
      var h_pct = clamp(Math.round((total / max_t) * 100), 0, 100);

      var stack_html;
      if (per_day_persona && per_day_persona[d]) {
        var ppd = per_day_persona[d];
        /* stacked segments in persona order (bottom = explorer) */
        var segs = PERSONA_NAMES.map(function (name) {
          var t = +(ppd[name] || 0);
          var seg_pct = clamp(Math.round((t / max_t) * 100), 0, 100);
          return '<div class="bar-seg" style="height:' + seg_pct + '%;background:' +
            (PERSONA_COLOR[name] || C.accent) + '"></div>';
        }).join('');
        stack_html = '<div class="bar-stack" style="height:' + h_pct + '%">' + segs + '</div>';
      } else {
        stack_html = '<div class="bar-stack" style="height:' + h_pct + '%;background:' +
          C.accent + '"></div>';
      }

      return '<div class="day-group">' + stack_html +
        '<div class="day-label">' + esc(date_md(d)) + '</div>' +
        '</div>';
    }).join('');

    var legend_html = per_day_persona
      ? '<div class="legend">' + PERSONA_NAMES.map(function (name) {
          return '<div class="legend-item">' +
            '<div class="legend-dot" style="background:' + (PERSONA_COLOR[name] || C.accent) + '"></div>' +
            esc(name) + '</div>';
        }).join('') + '</div>'
      : '';

    return '<div class="panel"><h2>Token Usage / Day</h2>' +
      '<div class="chart-area">' + bars + '</div>' +
      legend_html +
      '</div>';
  }

  function build_log(log) {
    var entries = log.slice(0, 50).map(function (e) {
      var ts, msg;
      if (typeof e === 'object' && e) {
        ts  = e.ts || '';
        msg = e.action
          ? (e.agent ? '[' + e.agent + '] ' : '') + e.action + (e.detail ? ': ' + e.detail : '')
          : (e.event || e.msg || JSON.stringify(e));
      } else {
        ts = ''; msg = String(e);
      }
      return '<div class="log-entry">' +
        '<span class="log-ts">' + esc(ts_hms(ts)) + '</span>' +
        '<span class="log-msg">' + esc(msg) + '</span>' +
        '</div>';
    }).join('') || '<div style="color:var(--muted);font-size:11px">No events</div>';

    return '<div class="panel"><h2>Event Log</h2>' +
      '<div class="log-scroll">' + entries + '</div>' +
      '</div>';
  }

  /* ── auto-refresh via script-tag replacement ── */
  var _script = null;
  var _tick_el = document.getElementById('tick');

  function load_state() {
    if (_script && _script.parentNode) {
      _script.parentNode.removeChild(_script);
    }
    var s = document.createElement('script');
    s.src = '../agent-hub/dashboard/state.js?t=' + Date.now();
    s.onload = function () {
      var state = (typeof window.__ORAPLI_STATE__ !== 'undefined')
        ? window.__ORAPLI_STATE__ : null;
      render(state);
      if (_tick_el) {
        _tick_el.textContent = 'Updated ' + new Date().toLocaleTimeString();
      }
    };
    s.onerror = function () {
      render(null);
    };
    _script = s;
    document.head.appendChild(s);
  }

  /* show placeholder while first load is in flight */
  render(null);
  load_state();
  setInterval(load_state, 5000);
}());
</script>
</body>
</html>
